<div class="article-form bg-white shadow-md rounded-lg p-6 mb-8">
  <h2 class="text-2xl font-bold text-gray-800 mb-4">Ajouter un article</h2>
  <form (ngSubmit)="addArticle()" #articleForm="ngForm">
    <div class="mb-4">
      <label for="title" class="block text-gray-700 font-medium mb-2">Titre :</label>
      <input
        type="text"
        id="title"
        name="title"
        [(ngModel)]="newArticle.title"
        required
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200"
      />
    </div>
    <div class="mb-6">
      <label for="content" class="block text-gray-700 font-medium mb-2">Contenu :</label>
      <textarea
        id="content"
        name="content"
        [(ngModel)]="newArticle.content"
        required
        rows="4"
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition duration-200 resize-y"
      ></textarea>
    </div>
    <button 
      type="submit"
      [disabled]="articleForm.invalid"
      class="w-full bg-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200 disabled:opacity-50 disabled:cursor-not-allowed"
    >
      Ajouter
    </button>
  </form>
</div>

<div class="bg-white shadow-md rounded-lg p-6">
  <p class="text-gray-600 mb-4 font-medium">Articles count: {{ articles.length }}</p>

  <div *ngFor="let article of articles" class="mb-6 pb-6 border-b border-gray-200 last:border-b-0 last:mb-0 last:pb-0">
    <h2 class="text-xl font-bold text-gray-800 mb-2">{{ article.title }}</h2>
    <p class="text-gray-600 mb-4 whitespace-pre-line">{{ article.content }}</p>
    <button 
      (click)="deleteArticle(article._id)"
      class="bg-red-100 text-red-600 font-medium py-2 px-4 rounded-lg hover:bg-red-200 focus:ring-2 focus:ring-red-500 focus:ring-offset-2 transition duration-200"
    >
      Supprimer
    </button>
  </div>

  <p *ngIf="articles.length === 0" class="text-gray-500 italic text-center py-8">
    Aucun article trouvé.
  </p>
</div>
