<div class="mt-6 border-t border-gray-200 pt-6 overflow-hidden">

  <!-- Animated filters container -->
  <div
    *ngIf="category"
    class="transition-all duration-300 ease-in-out"
    [ngClass]="{
      'max-h-0 opacity-0': !category,
      'max-h-[2000px] opacity-100': category
    }"
  >
    
    <!-- Section header -->
    <div class="flex items-center gap-3 mb-6 px-3">
      <div class="w-8 h-8 rounded-lg bg-blue-100 flex items-center justify-center">
        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
        </svg>
      </div>
      <h4 class="font-bold text-gray-800 text-lg">{{ category.name }} Filters</h4>
    </div>

    <!--<pre class="text-xs bg-gray-50 p-3 rounded-lg mb-4">{{ category | json }}</pre>-->

    <!-- Filters list -->
    <div class="space-y-6 px-3">
      <div *ngFor="let filter of category.filters" 
           class="pb-6 border-b border-gray-100 last:border-0 last:pb-0">
        
        <!-- SELECT Filter -->
        <div *ngIf="filter.type === 'select'" class="space-y-2">
          <label class="block font-semibold text-gray-700 text-sm mb-2">
            {{ filter.key.replace('_', ' ') }}
          </label>
          <div class="relative">
            <select #sel
              class="w-full border border-gray-300 rounded-lg p-3 pl-4 pr-10 
                     text-gray-700 bg-white appearance-none focus:outline-none 
                     focus:ring-2 focus:ring-blue-500 focus:border-blue-500 
                     hover:border-gray-400 transition-colors duration-200"
              (change)="onSelectChange(filter.key, sel.value)">
              <option value="">All {{ filter.key.replace('_', ' ') }}</option>
              <option *ngFor="let option of filter.options" 
                      [value]="option"
                      [selected]="selectedFilters[filter.key] === option">
                {{ option }}
              </option>
            </select>
            <div class="absolute inset-y-0 right-0 flex items-center pr-3 pointer-events-none">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
          </div>
        </div>

        <!-- CHECKBOX Filter -->
        <div *ngIf="filter.type === 'checkbox'" class="space-y-2">
          <p class="font-semibold text-gray-700 text-sm mb-3">
            {{ filter.key.replace('_', ' ') }}
          </p>
          <div class="space-y-2">
            <label *ngFor="let option of filter.options" 
                   class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-50 
                          transition-colors duration-200 cursor-pointer">
              <div class="relative">
                <input type="checkbox"
                       [checked]="selectedFilters[filter.key]?.includes(option)"
                       (change)="onCheckboxChange(filter.key, option, $event.target.checked)"
                       class="w-4 h-4 rounded border-gray-300 text-blue-600 
                              focus:ring-blue-500 focus:ring-offset-0 cursor-pointer" />
              </div>
              <span class="text-gray-700">{{ option }}</span>
            </label>
          </div>
        </div>

        <!-- RANGE Filter -->
        <div *ngIf="filter.type === 'range'" class="space-y-3">
          <div class="flex justify-between items-center">
            <p class="font-semibold text-gray-700 text-sm">
              {{ filter.key.replace('_', ' ') }}
            </p>
            <span class="text-sm font-medium text-gray-600">
              {{ selectedFilters[filter.key] || filter.min }}
            </span>
          </div>
          
          <div class="space-y-2">
            <input #rangeInput
              type="range"
              [min]="filter.min"
              [max]="filter.max"
              [value]="selectedFilters[filter.key] || filter.min"
              class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer
                     [&::-webkit-slider-thumb]:appearance-none [&::-webkit-slider-thumb]:h-4 
                     [&::-webkit-slider-thumb]:w-4 [&::-webkit-slider-thumb]:rounded-full 
                     [&::-webkit-slider-thumb]:bg-blue-600 [&::-webkit-slider-thumb]:border-0
                     [&::-moz-range-thumb]:h-4 [&::-moz-range-thumb]:w-4 
                     [&::-moz-range-thumb]:rounded-full [&::-moz-range-thumb]:bg-blue-600 
                     [&::-moz-range-thumb]:border-0"
              (input)="onRangeChange(filter.key, rangeInput.valueAsNumber)" />
            
            <div class="flex justify-between text-xs text-gray-500">
              <span>{{ filter.min }}</span>
              <span>{{ filter.max }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty state when no category selected -->
  <div *ngIf="!category" 
       class="text-center py-8 text-gray-400">
    <svg class="w-10 h-10 mx-auto mb-3 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
            d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/>
    </svg>
    <p class="text-sm text-gray-500">Select a category to see filters</p>
  </div>

</div>
