<div class="space-y-8">

  <!-- Header with subtle background -->
  <div class="bg-gradient-to-r from-gray-50 to-white p-2 rounded-xl">
    <h1 class="text-3xl font-bold text-gray-900 mb-3">Browse Products</h1>
    <p class="text-gray-600">
      Discover our collection of {{ products?.length || 0 }} quality items
    </p>
  </div>

  <div class="flex flex-col lg:flex-row gap-6">
    <!-- Sidebar with Categories and Filters -->
    <div class="w-full lg:w-64 flex-shrink-0">
      <div class="bg-white rounded-lg shadow-sm p-4 sticky top-20">
        <!-- Clear Filters Button -->
        <button 
          *ngIf="activeFilters && (activeFilters['categoryId'] || hasVariantFilters())"
          (click)="clearFilters()"
          class="w-full mb-4 px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg transition-colors flex items-center justify-center gap-2"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
          Clear Filters
        </button>

        <!-- Category List -->
        <div class="mb-6">
          <h3 class="font-bold text-gray-800 text-lg mb-3">Categories</h3>
          <app-category-list (categorySelected)="onCategorySelected($event)"></app-category-list>
        </div>

        <!-- Category Filters (variant attributes) -->
        <app-category-specs 
          [category]="selectedCategory"
          (filtersChanged)="onFiltersChanged($event)">
        </app-category-specs>
      </div>
    </div>

    <!-- Product grid -->
    <div class="flex-1 px-1">
      <app-product-grid
        [products]="products"
        [activeFilters]="activeFilters">
      </app-product-grid>
      
      <!-- Empty state -->
      <div *ngIf="products.length === 0" class="text-center py-12">
        <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" 
                d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <p class="text-gray-500 text-lg">No products found</p>
        <p class="text-gray-400 text-sm mt-1">Try adjusting your filters</p>
        <button 
          (click)="clearFilters()"
          class="mt-4 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
        >
          Clear all filters
        </button>
      </div>
    </div>
  </div>

</div>
