<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
      </div>
      <h2 class="text-2xl font-bold text-gray-900">Bienvenue</h2>
      <p class="text-gray-500 text-sm">Connectez-vous à votre compte</p>
    </div>
    
    <!-- Error message -->
    <div *ngIf="error" 
         class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm">
      {{ error }}
    </div>
    
    <form (ngSubmit)="submit()" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input [(ngModel)]="email" name="email" type="email" required 
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" required 
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" />
      </div>
      
      <button type="submit" [disabled]="loading" 
              class="w-full bg-blue-600 text-white font-medium py-2.5 rounded-lg hover:bg-blue-700 transition-colors disabled:opacity-50">
        {{ loading ? 'Connexion...' : 'Se connecter' }}
      </button>
      
      <p class="text-center text-sm text-gray-600">
        Pas encore de compte ? 
        <a routerLink="/register" class="text-blue-600 hover:text-blue-800 font-medium">
          Créer un compte
        </a>
      </p>
    </form>
  </div>
</div>
