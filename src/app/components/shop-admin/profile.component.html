<div class="max-w-4xl mx-auto bg-white p-6 rounded-lg shadow-md">
  <h2 class="text-2xl font-bold mb-6">Profil de ma Boutique</h2>

  <div *ngIf="loading" class="text-center py-8">
    <p class="text-gray-500">Chargement...</p>
  </div>

  <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
    {{ error }}
  </div>

  <div *ngIf="success" class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
    {{ success }}
  </div>

  <form *ngIf="!loading" (ngSubmit)="save()" class="space-y-6">
    <!-- Shop Name -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Nom de la boutique</label>
      <input 
        [(ngModel)]="shop.name" 
        name="name" 
        class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Nom de votre boutique"
      />
    </div>

    <!-- Description -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
      <textarea 
        [(ngModel)]="shop.description" 
        name="description" 
        rows="4"
        class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
        placeholder="Décrivez votre boutique..."
      ></textarea>
    </div>

    <!-- Contact Info -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email de contact</label>
        <input 
          [(ngModel)]="shop.contact!.email" 
          name="email" 
          type="email"
          class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="contact@boutique.com"
        />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Téléphone</label>
        <input 
          [(ngModel)]="shop.contact!.phone" 
          name="phone" 
          type="tel"
          class="w-full border border-gray-300 px-3 py-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="+33 1 23 45 67 89"
        />
      </div>
    </div>

    <!-- Rent (read-only for shop admin) -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Loyer (€)</label>
      <input 
        [ngModel]="shop.rent" 
        name="rent" 
        type="number"
        disabled
        class="w-full border border-gray-200 px-3 py-2 rounded-md bg-gray-50 text-gray-500"
      />
      <p class="text-xs text-gray-500 mt-1">Le loyer est défini par l'administrateur du centre</p>
    </div>

    <!-- Images -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Images de la boutique</label>
      
      <!-- Image previews -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
        <div *ngFor="let img of imagePreviews; let i = index" class="relative group">
          <img [src]="img" alt="Shop image" class="w-full h-32 object-cover rounded-lg border border-gray-200" />
          <button 
            type="button"
            (click)="removeImage(i)"
            class="absolute top-1 right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        
        <!-- Add image button -->
        <label class="flex flex-col items-center justify-center h-32 border-2 border-dashed border-gray-300 rounded-lg cursor-pointer hover:border-blue-500 transition-colors">
          <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
          </svg>
          <span class="text-sm text-gray-500 mt-1">Ajouter</span>
          <input 
            type="file" 
            (change)="onFilesSelected($event)" 
            accept="image/*" 
            multiple 
            class="hidden"
          />
        </label>
      </div>
    </div>

    <!-- Submit Button -->
    <div class="flex justify-end">
      <button 
        type="submit" 
        [disabled]="saving"
        class="bg-blue-600 text-white px-6 py-2 rounded-md hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
      >
        <span *ngIf="saving">Enregistrement...</span>
        <span *ngIf="!saving">Enregistrer</span>
      </button>
    </div>
  </form>
</div>
