<div class="max-w-3xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
  
  <!-- Header with gradient -->
  <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-5">
    <h2 class="text-xl font-bold text-white">Ajouter un produit</h2>
  </div>

  <!-- Form content -->
  <div class="p-6 space-y-6">

    <!-- Basic Information -->
    <div class="bg-gray-50 rounded-xl p-5 space-y-4">
      <h3 class="font-semibold text-gray-800">Informations de base</h3>
      
      <!-- Product Name -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nom du produit</label>
        <input [(ngModel)]="model.name" name="name" 
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
               placeholder="Ex: T-shirt en coton" />
      </div>

      <!-- Category -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
        <select [(ngModel)]="model.categoryId" name="categoryId" 
                [compareWith]="compareCategories"
                class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 appearance-none bg-white">
          <option [ngValue]="null">— Sélectionner une catégorie —</option>
          <option *ngFor="let cat of categories" [ngValue]="cat">{{ cat.name }}</option>
        </select>
      </div>

      <!-- Base Price -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Prix de base</label>
        <input type="number" [(ngModel)]="model.basePrice" name="basePrice" 
               class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
               placeholder="0.00" />
      </div>

      <!-- Images -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Images (URLs)</label>
        <textarea [(ngModel)]="imageInput" name="images" 
                  class="w-full border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 h-20 resize-none"
                  placeholder="https://exemple.com/image1.jpg, https://exemple.com/image2.jpg"></textarea>
        <p class="text-xs text-gray-500 mt-1">Séparez les URLs par des virgules</p>
      </div>
    </div>

    <!-- Variants -->
    <div class="bg-gray-50 rounded-xl p-5 space-y-4">
      <h3 class="font-semibold text-gray-800">Variantes</h3>
      
      <div class="space-y-4">
        <div *ngFor="let v of model.variants; let i = index" class="bg-white border border-gray-200 rounded-xl p-4 space-y-4">
          <div class="flex items-center justify-between">
            <span class="font-medium text-gray-700">Variante {{ i + 1 }}</span>
            <button type="button" (click)="removeVariant(i)" 
                    class="text-sm text-red-600 px-3 py-1 rounded hover:bg-red-50">
              Supprimer
            </button>
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">SKU</label>
              <input [(ngModel)]="v.sku" name="sku{{i}}" class="w-full border border-gray-300 rounded-lg px-4 py-2"
                     placeholder="REF001" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Stock</label>
              <input type="number" [(ngModel)]="v.stock" name="stock{{i}}" class="w-full border border-gray-300 rounded-lg px-4 py-2"
                     placeholder="10" />
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-600 mb-1">Prix</label>
              <input type="number" [(ngModel)]="v.price" name="price{{i}}" class="w-full border border-gray-300 rounded-lg px-4 py-2"
                     placeholder="29.99" />
            </div>
          </div>

          <!-- Attributes -->
          <div *ngIf="model.categoryId?.filters && (model.categoryId?.filters?.length ?? 0) > 0" class="mt-4 pt-4 border-t">
            <p class="text-sm font-medium text-gray-700 mb-3">Attributs</p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div *ngFor="let filter of model.categoryId?.filters" class="space-y-1">
                <label class="block text-xs font-medium text-gray-600">{{ filter.key }}</label>
                <select *ngIf="filter.type === 'select'" 
                        [(ngModel)]="v.attributes[filter.key]" 
                        [name]="'attr_' + i + '_' + filter.key"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 text-sm">
                  <option value="">— Sélectionner —</option>
                  <option *ngFor="let opt of filter.options" [value]="opt">{{ opt }}</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <button type="button" (click)="addVariant()" [disabled]="!model.categoryId"
                class="w-full py-3 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-blue-500 hover:text-blue-600 disabled:opacity-50">          + Ajouter une variante
        </button>
      </div>
    </div>

    <!-- Form Actions -->
    <div class="flex justify-end gap-3 pt-4 border-t">
      <a href="/shop-admin/products" class="px-6 py-2.5 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">
        Annuler
      </a>
      <button (click)="submit()" 
              class="bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold py-2.5 px-8 rounded-lg hover:from-blue-700 hover:to-blue-800">
        Ajouter
      </button>
    </div>

  </div>
</div>
