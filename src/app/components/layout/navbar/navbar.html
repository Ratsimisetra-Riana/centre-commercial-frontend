<nav class="h-16 md:h-14 flex items-center justify-between px-4 md:px-8
            bg-gradient-to-r from-gray-900 via-gray-800 to-blue-900 
            text-white shadow-lg sticky top-0 z-50">

  <!-- Left section with hamburger and logo -->
  <div class="flex items-center gap-4 md:gap-6">
    <button
      class="md:hidden p-2 hover:bg-blue-700 rounded-lg transition-colors duration-200
             focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 focus:ring-offset-blue-600"
      (click)="toggleSidebar.emit()"
      aria-label="Toggle menu">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>

    <!-- Logo/Title with icon -->
    <div class="flex items-center gap-3">
      <div class="hidden md:flex items-center justify-center w-10 h-10 bg-white/10 rounded-lg">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
        </svg>
      </div>
      <span class="font-bold text-xl md:text-2xl tracking-tight">Centre Commercial</span>
    </div>
  </div>

  <!-- Desktop Navigation -->
  <div class="hidden md:flex items-center gap-8">

              after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2
              after:w-0 after:h-0.5 after:bg-white after:transition-all after:duration-300
              hover:after:w-full group"
       routerLink="/products"
       routerLinkActive="text-white after:w-full"
       [routerLinkActiveOptions]="{exact: false}">-->
     
    
    <!-- <a class="relative px-3 py-2 hover:text-blue-100 transition-colors duration-200
              after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2
              after:w-0 after:h-0.5 after:bg-white after:transition-all after:duration-300
              hover:after:w-full group"
      routerLink="/profile"
       routerLinkActive="text-white after:w-full"
       [routerLinkActiveOptions]="{exact: false}" >-->
       <a  *ngIf="auth.isLoggedIn()" class="relative px-3 py-2 hover:text-blue-100 transition-colors duration-200
              after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2
              after:w-0 after:h-0.5 after:bg-white after:transition-all after:duration-300
              hover:after:w-full group"
       >
      <span class="flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
        </svg>
        {{ auth.getUser()?.name }}
      </span>
    </a>

    <!-- auth links -->
    <div *ngIf="!auth.isLoggedIn()" class="flex items-center gap-3">
       <a class="relative px-3 py-2 hover:text-blue-100 transition-colors duration-200
              after:absolute after:bottom-0 after:left-1/2 after:-translate-x-1/2
              after:w-0 after:h-0.5 after:bg-white after:transition-all after:duration-300
              hover:after:w-full group"
        routerLink="/login"
       >
      <span class="flex items-center gap-2">
        Connexion
      </span>
    </a>
    
   
    </div>

    <div *ngIf="auth.isLoggedIn()" class="flex items-center gap-3">
      <button (click)="logout()" class="text-sm hover:text-red-300">Se déconnecter</button>
    </div>
  
</div>

  <!-- Mobile menu button (optional additional action) -->
  <button class="md:hidden p-2 hover:bg-blue-700 rounded-lg transition-colors duration-200
                 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2 focus:ring-offset-blue-600"
          aria-label="User menu">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
    </svg>
  </button>
</nav>
