<div class="flex flex-col min-h-screen bg-gray-100">

  <!-- NAVBAR -->
  <app-navbar (toggleSidebar)="toggleSidebar()"></app-navbar>

  <!-- BODY -->
  <div class="flex flex-1">

<app-sidebar
  [ngClass]="{
    'translate-x-0': sidebarOpen,
    'hidden': !sidebarOpen
  }"
  class="fixed md:static top-0 bottom-0 left-0 z-40
         w-64 bg-white border-gray-900
         transform transition-transform duration-300
         md:translate-x-0">
</app-sidebar>

    <!-- OVERLAY (mobile only) -->
    <div
      *ngIf="sidebarOpen"
      (click)="toggleSidebar()"
      class="fixed inset-0 bg-black/40 md:hidden z-30">
    </div>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-4 md:p-6 bg-gray-50 relative">
      <!-- Toggle sidebar button -->
      <button
        (click)="toggleSidebar()"
        class="absolute top-4 left-4 z-10 p-2 bg-white rounded-lg shadow-md hover:bg-gray-50 transition-colors"
        title="Toggle menu"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <router-outlet></router-outlet>
    </main>

  </div>

  <!-- FOOTER -->
  <app-footer></app-footer>

</div>
