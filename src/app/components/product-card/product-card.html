<div class="border border-gray-200 rounded-xl bg-white overflow-hidden hover:shadow-lg transition-all duration-300 hover:-translate-y-1 group">
  <a [routerLink]="['/products', product._id]" class="block">
    <!-- IMAGE CONTAINER -->
    <div class="relative aspect-square bg-gradient-to-br from-gray-50 to-gray-100 overflow-hidden">
      <img
        [src]="product.images?.[0] || '/assets/placeholder.png'"
        [alt]="product.name"
        class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
        loading="lazy"
      />

      <!-- STOCK BADGE 
      <div class="absolute top-3 left-3">
        <span *ngIf="!inStock" 
              class="bg-red-500 text-white text-xs font-semibold px-3 py-1.5 rounded-full shadow-md flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          Rupture
        </span>
        <span *ngIf="inStock" 
              class="bg-green-500 text-white text-xs font-semibold px-3 py-1.5 rounded-full shadow-md flex items-center gap-1">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
          </svg>
          En stock
        </span>
      </div>-->

      <!-- SHOP BADGE (if shop info exists) -->
      <div *ngIf="product.shopId?._id" class="absolute top-3 right-3">
        <span class="bg-white/90 backdrop-blur-sm text-gray-700 text-xs font-medium px-2 py-1 rounded-full shadow-sm">
          {{ product.shopId?.name || 'Boutique' }}
        </span>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="p-4">
      <h3 class="font-medium text-gray-800 mb-2 line-clamp-2 group-hover:text-blue-600 transition-colors duration-200">
        {{ product.name }}
      </h3>
      
      <div class="flex items-baseline gap-2">
        <span class="text-xl font-bold text-gray-900">{{ (product.basePrice || 0) | currency }}</span>
        <span *ngIf="product.originalPrice" class="text-sm text-gray-400 line-through">{{ product.originalPrice | currency }}</span>
      </div>
    </div>
  </a>

  <!-- CARD FOOTER -->
   
  <div class="px-4 py-3 border-t border-gray-100 bg-gray-50 flex items-center justify-between gap-2">
    <!-- 
    <button (click)="addToCart()" 
            [disabled]="!inStock"
            class="flex-1 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-medium px-4 py-2 rounded-lg 
                   hover:from-blue-700 hover:to-blue-800 transition-all duration-200 shadow-sm hover:shadow-md
                   disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:from-blue-600 disabled:hover:to-blue-700
                   flex items-center justify-center gap-2 text-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
      </svg>
      Ajouter
    </button>-->
    
    <a [routerLink]="['/shops', product.shopId?._id]" 
       class="px-3 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-white hover:border-gray-400 transition-all duration-200 flex items-center gap-1 text-sm group">
      <span>Boutique</span>
      <svg class="w-4 h-4 text-gray-500 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</div>
